<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 12px 2px rgba(168, 218, 220, 0.4);
    }

    #restart {
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #restart:hover { background: #c73652; }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { color: #eee; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="score">
    X wins: <span id="xScore">0</span>
    &nbsp;|&nbsp;
    Draws: <span id="drawScore">0</span>
    &nbsp;|&nbsp;
    O wins: <span id="oScore">0</span>
  </div>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <button id="restart">Restart</button>

  <script>
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    const xScoreEl = document.getElementById('xScore');
    const oScoreEl = document.getElementById('oScore');
    const drawScoreEl = document.getElementById('drawScore');

    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let cells, current, gameOver, scores = {X:0, O:0, D:0};

    function init() {
      cells = Array(9).fill('');
      current = 'X';
      gameOver = false;
      status.textContent = "Player X's turn";
      board.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', onClick);
        board.appendChild(cell);
      }
    }

    function onClick(e) {
      const i = +e.target.dataset.i;
      if (gameOver || cells[i]) return;
      cells[i] = current;
      e.target.textContent = current;
      e.target.classList.add('taken', current.toLowerCase());

      const winLine = checkWin();
      if (winLine) {
        winLine.forEach(idx => board.children[idx].classList.add('win'));
        status.textContent = `Player ${current} wins!`;
        scores[current]++;
        updateScore();
        gameOver = true;
      } else if (cells.every(c => c)) {
        status.textContent = "It's a draw!";
        scores.D++;
        updateScore();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `Player ${current}'s turn`;
      }
    }

    function checkWin() {
      return wins.find(([a,b,c]) => cells[a] && cells[a] === cells[b] && cells[b] === cells[c]) || null;
    }

    function updateScore() {
      xScoreEl.textContent = scores.X;
      oScoreEl.textContent = scores.O;
      drawScoreEl.textContent = scores.D;
    }

    document.getElementById('restart').addEventListener('click', init);
    init();
  </script>
</body>
</html>
